metadata:
  owner: Hojin rover model team
  coordinate_convention: Chrono_XForward_YLeft_ZUp; origin at the ground-plane projection of the 4-wheel contact rectangle center
  command_type: wheel_speed
  wheel_count: 4
  max_wheel_speed_radps: 15.0
  note: >
    Reconciled 2026-07-14 to match rover_models/main_v01 (the real,
    Chrono-verified spec from handoff/rover_module_v01). This entry was
    previously an unverified 48 kg / 0.16 m wheel placeholder that conflicted
    with the team's actual mass policy: main stays in the 1.5-3 kg range,
    deliberately heavier than scout_v01 but not a different scale of vehicle
    -- see handoff/rover_module_v01/02_설계_이유.md. That 1.5-3 kg range is a
    real team decision (2026-07-14), not a placeholder guess; a genuinely
    larger/heavier main rover would need its own from-scratch motor/wheel/
    torque design and Chrono validation, which does not exist yet.
    This rover_id is kept (rather than deleted) only because
    tests/test_integration_skeleton.py, tests/test_pychrono_smoke.py, and
    tests/test_handoff_integration.py already wire through it as the default
    main-rover fixture with fallback_mu_eff/fallback_crr filled in for
    HeuristicBackend. fallback_mu_eff/fallback_crr are still assumed values,
    not measured -- rover_models/main_v01 intentionally leaves them blank so
    nobody feeds fabricated friction into a real PyChrono run by accident.
